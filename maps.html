<!DOCTYPE html>
<html lang="en">
<head></head>
<body style="display:none;">

    <banner id="banner"></banner>
  <!-- Top Navbar -->
<nav id ="nav"></nav>

<!-- Main Content -->
<main>
<div class="w-100 text-center current-page py-2">
    The data on this page is administrative data collected through the police recorded crime system. They are published annually. 
 </div>

<div id="content" class="container-fluid">
           

    <div class="row py-2">
        <div class="col-12">
            <div class="card">
                <div class="card-body">
                    <small class="text-muted d-block mb-2">
                        Choose a crime type, statistic and year to update the map.
                    </small>
        <div class="row align-items-end g-3">
        <div class="col-12 col-md-4">
            <label for="crime-filter" class="form-label fw-bold">Crime type</label>
            <select id="crime-filter" class="form-select">
                <option value="Sexual offences" selected>Sexual offences</option>
                <option value="Stalking & Harassment">Stalking & Harassment</option>
                <option value="Violence with injury">Violence with injury</option>
                <option value="Violence without injury">Violence without injury</option>
            </select>
        </div>

        <div class="col-12 col-md-4">
            <div class="form-label fw-bold px-4">Crime statistic</div>

            <div class="d-flex gap-4 px-4">
            <div class="form-check">
                <input class="form-check-input" type="radio" name="map-metric" id="metric-count" value="count" checked>
                <label class="form-check-label" for="metric-count">
                    All crimes recorded
                </label>
            </div>

            <div class="form-check">
                <input class="form-check-input" type="radio" name="map-metric" id="metric-rate" value="rate">
                <label class="form-check-label" for="metric-rate">
                    Crime rate (per 1000 population)
                </label>
            </div>
            </div>
        </div>
    </div>

    <div class="row align-items-center g-3 mt-3">
    <div class="col-12 col-md-4">
        <label for="year-slider" class="form-label">
            <span class="fw-bold">Year: </span><span id="year-slider-value"></span>
        </label>
        <input id="year-slider" class="form-range" type="range">
    </div>
</div>

    
</div>
            </div>
        </div>
    </div>

           
    <div class="row">
        
        <div class="col-12 col-xl-8 py-2">
            <div id="map-card" class="card h-100">
                <div id="map-title" class="card-header">
                    Map
                </div>
                <div class="card-body">
                    <div id="map-legend" class="mt-3"></div>
                    <small class="text-muted d-block mt-2">
                        Hover over individual areas on the map to see more details.
                    </small>
                    <div id="map-container" class="map"></div>
                </div>
    
                <div class="card-footer"></div>
            </div>
        </div>

         <div class="col-12 col-xl-4 py-2">
            <div class="card h-100">
                <div class="card-header">
                    Data
                </div>
                <div class="card-body">
                    <table id="map-data-table" class="table mt-3"></table>
                </div>
            </div>
        </div>            
        
    </div>

            <!-- Third row - Definitions -->
            <div id="info-boxes"></div>

        
    </main>
</div>

<footer id = "footer"></footer>

<script type = "module" src="src/maps.js"></script>


</body>
